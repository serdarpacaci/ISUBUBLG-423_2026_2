services:
  rabbitmq:
    restart: always
    image: rabbitmq:4.2.1-management
    container_name: rabbitmq
    ports:
      - 5672:5672  
      - 15672:15672 
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data:
